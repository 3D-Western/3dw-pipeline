repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: core-ruff
        name: core ruff check
        entry: bash -c 'cd core && uv run ruff check .'
        language: system
        pass_filenames: false
        files: ^core/

      - id: core-mypy
        name: core mypy
        entry: bash -c 'cd core && uv run mypy .'
        language: system
        pass_filenames: false
        files: ^core/

      - id: mcp-server-ruff
        name: mcp-server ruff check
        entry: bash -c 'cd mcp-server && uv run ruff check .'
        language: system
        pass_filenames: false
        files: ^mcp-server/

      - id: mcp-server-mypy
        name: mcp-server mypy
        entry: bash -c 'cd mcp-server && uv run mypy src'
        language: system
        pass_filenames: false
        files: ^mcp-server/

      - id: core-pytest
        name: core pytest
        entry: bash -c 'cd core && uv run pytest -q'
        language: system
        pass_filenames: false
        files: ^core/
        stages: [pre-push]

      - id: mcp-server-pytest
        name: mcp-server pytest
        entry: bash -c 'cd mcp-server && uv run pytest -q'
        language: system
        pass_filenames: false
        files: ^mcp-server/
        stages: [pre-push]
