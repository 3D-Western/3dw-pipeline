services:
  windmill:
    build:
      context: ../..
      dockerfile: infra/windmill/Dockerfile
    image: windpipe-windmill:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MODEL_RENDER_BACKEND=${MODEL_RENDER_BACKEND:-openscad}
      - MODEL_RENDER_SCRIPT=${MODEL_RENDER_SCRIPT:-/opt/windpipe/core/slicing/model_render/render_stl.sh}
    volumes:
      - ../../core:/opt/windpipe/core:ro
